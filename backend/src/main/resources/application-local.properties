server.port=8081

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/budgetflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}

spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Pavan@0037}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.jakarta.persistence.jdbc.url=${spring.datasource.url}
spring.jpa.properties.jakarta.persistence.jdbc.user=${spring.datasource.username}
spring.jpa.properties.jakarta.persistence.jdbc.password=${spring.datasource.password}
spring.jpa.properties.jakarta.persistence.jdbc.driver=${spring.datasource.driver-class-name}
